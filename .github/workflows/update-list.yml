name: Update Living Repo Catalog

on:
  schedule:
    - cron: '0 2 * * *'  # daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_living_list.py

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'chore: auto-update living repo catalog'
          add: 'README.md badges.xml'
